# GitHub Pages: enable in repo Settings → Pages → Source "GitHub Actions".
# Add secrets: VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY (Repository → Settings → Secrets).
# Optional: VITE_SERVER_URL (arena API). Supabase Auth → URL Configuration: add
# https://<user>.github.io/<repo>/** and the same Site URL if needed.

name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
